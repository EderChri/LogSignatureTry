# datasets.cfg — Dataset pair registry for sweep scripts
#
# Each section defines one pretrain→finetune domain-adaptation pair.
# Source this file in bash scripts:   source datasets.cfg; eval "cfg_${PAIR}"
#
# Field order (space-separated, NO SPACES within values):
#   PRETRAIN_DATA  PRETRAIN_NUM_FEATURE  PRETRAIN_NUM_TARGET
#   FINETUNE_DATA  FINETUNE_NUM_FEATURE  FINETUNE_NUM_TARGET

# SleepEEG pretrain → Epilepsy finetune
cfg_sleepeeg_epilepsy=(
  PRETRAIN_DATA="_DA_SleepEEG_256_00"
  PRETRAIN_NUM_FEATURE=1
  PRETRAIN_NUM_TARGET=5
  FINETUNE_DATA="_DA_Epilepsy_256_00"
  FINETUNE_NUM_FEATURE=1
  FINETUNE_NUM_TARGET=2
)

# HARTH pretrain → HAR70plus finetune
cfg_harth_har70plus=(
  PRETRAIN_DATA="_DA_HARTH_256_00"
  PRETRAIN_NUM_FEATURE=6
  PRETRAIN_NUM_TARGET=12
  FINETUNE_DATA="_DA_HAR70plus_256_00"
  FINETUNE_NUM_FEATURE=6
  FINETUNE_NUM_TARGET=7
)
